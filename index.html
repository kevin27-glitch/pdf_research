<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>KK-Stuengine | IB PDF Search</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 0 15px; }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 25px;
  }
  .logo {
    width: 48px;
    height: 48px;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960"><rect width="960" height="960" fill="%23f5f5f5"/><path d="M480 220c-80 0-155 32-210 85l-10 10c-55 55-85 130-85 210s30 155 85 210l10 10c55 55 130 85 210 85s155-30 210-85l10-10c55-55 85-130 85-210s-30-155-85-210l-10-10c-55-53-130-85-210-85zm0 40c65 0 125 25 170 70l8 8c45 45 70 105 70 170s-25 125-70 170l-8 8c-45 45-105 70-170 70s-125-25-170-70l-8-8c-45-45-70-105-70-170s25-125 70-170l8-8c45-45-105-70-170-70z" fill="%23007bff"/><path d="M480 220v560M270 440h420M480 330v300M375 440v200M585 440v200M322.5 385h315M322.5 495h315M322.5 605h315" stroke="white" stroke-width="12" fill="none"/><path d="M480 220c-60 0-115 20-160 55l-10 10c-45 45-65 100-65 160s20 115 65 160l10 10c45 45 100 65 160 65s115-20 160-65l10-10c45-45 65-100 65-160s-20-115-65-160l-10-10c-45-35-100-55-160-55z" stroke="white" stroke-width="12" fill="none"/></svg>');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
  }
  .site-title {
    font-size: 26px;
    font-weight: bold;
    color: #007bff;
    margin: 0;
  }

  input { width: 100%; padding: 10px; font-size: 18px; margin-bottom: 20px; box-sizing: border-box; }
  .result { padding: 12px; border-bottom: 1px solid #eee; }
  .result a { font-size: 16px; color: #007bff; text-decoration: none; }
  .result a:hover { text-decoration: underline; }

  .add-btn {
    position: fixed;
    bottom: 25px;
    right: 25px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #007bff;
    color: white;
    font-size: 30px;
    text-align: center;
    line-height: 60px;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
  }

  .upload-modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
  }
  .modal-box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 90%;
    max-width: 400px;
  }
  .modal-box input {
    margin-bottom: 15px;
  }
  .modal-box button {
    background: #007bff;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    cursor: pointer;
    margin-right: 10px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo"></div>
  <h1 class="site-title">KK-Stuengine</h1>
</div>

<input type="text" id="searchInput" placeholder="Search Physics B1、B2、C1...">
<div id="results"></div>

<div class="add-btn" onclick="openUpload()">+</div>

<div class="upload-modal" id="uploadModal">
  <div class="modal-box">
    <h3>Add New PDF</h3>
    <input type="text" id="pdfName" placeholder="Enter name (e.g. Physics B1)">
    <input type="file" id="pdfFile" accept="application/pdf">
    <button onclick="savePDF()">Add</button>
    <button onclick="closeUpload()">Cancel</button>
  </div>
</div>

<script>
// 强制加载 GitHub 旧文件 + 本地新文件
let combinedList = [];

async function loadAllData() {
  try {
    // 1. 加载 GitHub JSON
    const res = await fetch("https://raw.githubusercontent.com/kevin27-glitch/pdf_research/refs/heads/main/links.json");
    const jsonData = await res.json();
    const githubFiles = jsonData.map(item => ({
      name: item.key,
      url: item.url
    }));

    // 2. 加载本地上传的文件
    const localFiles = JSON.parse(localStorage.getItem("myPDFs")) || [];

    // 3. 合并：旧 + 新
    combinedList = [...githubFiles, ...localFiles];
    console.log("✅ 旧文件已加载:", githubFiles);
  } catch (e) {
    // 失败只显示本地
    combinedList = JSON.parse(localStorage.getItem("myPDFs")) || [];
  }
}

// 页面打开时先加载数据
loadAllData();

// 搜索功能
const searchInput = document.getElementById('searchInput');
const results = document.getElementById('results');

searchInput.addEventListener('input', async function(e) {
  const keyword = e.target.value.trim().toLowerCase();
  results.innerHTML = '';
  if (!keyword) return;

  // 确保数据加载完再搜索
  if (combinedList.length === 0) await loadAllData();

  const filtered = combinedList.filter(item =>
    item.name.toLowerCase().includes(keyword)
  );

  filtered.forEach(item => {
    results.innerHTML += `<div class="result"><a href="${item.url}" target="_blank">${item.name}</a></div>`;
  });
});

// 上传弹窗
function openUpload() { document.getElementById("uploadModal").style.display = "flex"; }
function closeUpload() { document.getElementById("uploadModal").style.display = "none"; }

// 保存新 PDF
function savePDF() {
  const name = document.getElementById("pdfName").value.trim();
  const file = document.getElementById("pdfFile").files[0];
  if (!name || !file) { alert("Please enter name and select PDF!"); return; }

  const url = URL.createObjectURL(file);
  const local = JSON.parse(localStorage.getItem("myPDFs")) || [];
  local.push({ name, url });
  localStorage.setItem("myPDFs", JSON.stringify(local));

  document.getElementById("pdfName").value = "";
  document.getElementById("pdfFile").value = "";
  closeUpload();
  alert("PDF added!");
}
</script>

</body>
</html>
