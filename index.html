<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>IB_PDF Searching Engine</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 0 15px; }
  input { width: 100%; padding: 10px; font-size: 18px; margin-bottom: 20px; box-sizing: border-box; }
  .result { padding: 12px; border-bottom: 1px solid #eee; }
  .result a { font-size: 16px; color: #007bff; text-decoration: none; }
  .result a:hover { text-decoration: underline; }
  .add-btn {
    position: fixed;
    bottom: 25px;
    right: 25px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #007bff;
    color: white;
    font-size: 30px;
    text-align: center;
    line-height: 60px;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>

<h1>PDF Search</h1>
<input type="text" id="searchInput" placeholder="Search Physics B1、B2、C1...">
<div id="results"></div>

<div class="add-btn" onclick="addNewLink()">+</div>

<script>
// 全局存储链接数据
window.linkData = [];

// 加载 JSON 数据
fetch("https://raw.githubusercontent.com/kevin27-glitch/pdf_research/refs/heads/main/links.json")
  .then(res => res.json())
  .then(data => {
    window.linkData = data;
    console.log("数据加载成功：", data);
  })
  .catch(err => console.error("加载失败", err));

// 获取 DOM
const searchInput = document.getElementById('searchInput');
const results = document.getElementById('results');

// 搜索功能
searchInput.addEventListener('input', function(e) {
  const keyword = e.target.value.trim().toLowerCase();
  results.innerHTML = '';

  if (!keyword) return;

  const filtered = window.linkData.filter(item =>
    item.key.toLowerCase().includes(keyword)
  );

  filtered.forEach(item => {
    results.innerHTML += `<div class="result"><a href="${item.url}" target="_blank">${item.key}</a></div>`;
  });
});

// 添加新链接（可打开你的编辑页）
function addNewLink() {
  const gistUrl = "https://gist.github.com/你的用户名/你的GistID";
  window.open(gistUrl, "_blank");
}
</script>

</body>
</html>
