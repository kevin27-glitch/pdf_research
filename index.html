<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>KK-Stuengine | IB PDF Search</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 0 15px; }

  /* 顶部导航栏：logo + 网站名 */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 25px;
  }
  .logo {
    width: 54px;
    height: 54px;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960"><rect width="960" height="960" fill="%23f5f5f5"/><path d="M480 220c-80 0-155 32-210 85l-10 10c-55 55-85 130-85 210s30 155 85 210l10 10c55 55 130 85 210 85s155-30 210-85l10-10c55-55 85-130 85-210s-30-155-85-210l-10-10c-55-53-130-85-210-85zm0 40c65 0 125 25 170 70l8 8c45 45 70 105 70 170s-25 125-70 170l-8 8c-45 45-105 70-170 70s-125-25-170-70l-8-8c-45-45-70-105-70-170s25-125 70-170l8-8c45-45 105-70 170-70z" fill="%23007bff"/><path d="M480 220v560M270 440h420M480 330v300M375 440v200M585 440v200M322.5 385h315M322.5 495h315M322.5 605h315" stroke="white" stroke-width="12" fill="none"/><path d="M480 220c-60 0-115 20-160 55l-10 10c-45 45-65 100-65 160s20 115 65 160l10 10c45 45 100 65 160 65s115-20 160-65l10-10c45-45 65-100 65-160s-20-115-65-160l-10-10c-45-35-100-55-160-55z" stroke="white" stroke-width="12" fill="none"/><path d="M200 560l280 280M760 560L480 840" stroke="white" stroke-width="12" fill="none"/><text x="480" y="780" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="%23007bff" text-anchor="middle" transform="rotate(-15 480 480)">KK-Stuengine</text></svg>');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
  }
  .site-title {
    font-size: 26px;
    font-weight: bold;
    color: #007bff;
    margin: 0;
  }

  input { width: 100%; padding: 10px; font-size: 18px; margin-bottom: 20px; box-sizing: border-box; }
  .result { padding: 12px; border-bottom: 1px solid #eee; }
  .result a { font-size: 16px; color: #007bff; text-decoration: none; }
  .result a:hover { text-decoration: underline; }
  .add-btn {
    position: fixed;
    bottom: 25px;
    right: 25px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #007bff;
    color: white;
    font-size: 30px;
    text-align: center;
    line-height: 60px;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>

<!-- 顶部：你的专属Logo + 网站名称 -->
<div class="header">
  <div class="logo" alt="KK-Stuengine Logo"></div>
  <h1 class="site-title">KK-Stuengine</h1>
</div>

<input type="text" id="searchInput" placeholder="Search Physics B1、B2、C1...">
<div id="results"></div>

<div class="add-btn" onclick="addNewLink()">+</div>

<script>
// 全局存储链接数据
window.linkData = [];

// 加载 JSON 数据
fetch("https://raw.githubusercontent.com/kevin27-glitch/pdf_research/refs/heads/main/links.json")
  .then(res => res.json())
  .then(data => {
    window.linkData = data;
    console.log("数据加载成功：", data);
  })
  .catch(err => console.error("加载失败", err));

// 获取 DOM
const searchInput = document.getElementById('searchInput');
const results = document.getElementById('results');

// 搜索功能
searchInput.addEventListener('input', function(e) {
  const keyword = e.target.value.trim().toLowerCase();
  results.innerHTML = '';

  if (!keyword) return;

  const filtered = window.linkData.filter(item =>
    item.key.toLowerCase().includes(keyword)
  );

  filtered.forEach(item => {
    results.innerHTML += `<div class="result"><a href="${item.url}" target="_blank">${item.key}</a></div>`;
  });
});

// 添加新链接
function addNewLink() {
  const gistUrl = "https://gist.github.com/你的用户名/你的GistID";
  window.open(gistUrl, "_blank");
}
</script>

</body>
</html>
